name: CulliganApp
options:
  bundleIdPrefix: com.dwcares.culligan
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 6
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: CZDSP7DQSH

targets:
  CulliganApp:
    type: application
    platform: iOS
    sources:
      - CulliganApp
    dependencies:
      - target: CulliganWidgetExtension
    entitlements:
      path: CulliganApp/CulliganApp.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.dwcares.culligan
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dwcares.culligan.app
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: CulliganApp/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: Aqualytics
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_STRICT_CONCURRENCY: complete

  CulliganWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - CulliganWidgetExtension
      - path: CulliganApp/Data
        group: Shared
      - path: CulliganApp/CulliganAPI/Models/AuthModels.swift
        group: Shared
    entitlements:
      path: CulliganWidgetExtension/CulliganWidgetExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.dwcares.culligan
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dwcares.culligan.app.widget
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: CulliganWidgetExtension/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: Aqualytics Widgets
        SWIFT_STRICT_CONCURRENCY: complete

  CulliganAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - CulliganAppTests
    dependencies:
      - target: CulliganApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dwcares.culligan.app.tests
        GENERATE_INFOPLIST_FILE: YES

  CulliganAppUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - CulliganAppUITests
    dependencies:
      - target: CulliganApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dwcares.culligan.app.uitests
        GENERATE_INFOPLIST_FILE: YES
