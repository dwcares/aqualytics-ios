name: CulliganApp
options:
  bundleIdPrefix: com.dwcares.culligan
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1

targets:
  CulliganApp:
    type: application
    platform: iOS
    sources:
      - CulliganApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dwcares.culligan.app
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: Culligan
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_STRICT_CONCURRENCY: complete

  CulliganAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - CulliganAppTests
    dependencies:
      - target: CulliganApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dwcares.culligan.app.tests
        GENERATE_INFOPLIST_FILE: YES
